name: auto-approve
on: pull_request

permissions: read-all

jobs:
  auto-approve:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Approve PR
        run: gh pr review --approve ${{ github.event.pull_request.html_url }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
